name: Checkout with retry
description: >-
  Wraps actions/checkout with explicit GITHUB_TOKEN and extra attempts for
  intermittent "could not read Username for https://github.com" failures.

inputs:
  fetch-depth:
    description: Passed to actions/checkout fetch-depth
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Checkout (attempt 1)
      id: checkout1
      uses: actions/checkout@v5
      continue-on-error: true
      with:
        token: ${{ github.token }}
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Checkout (attempt 2)
      id: checkout2
      if: steps.checkout1.outcome != 'success'
      uses: actions/checkout@v5
      continue-on-error: true
      with:
        token: ${{ github.token }}
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Checkout (attempt 3)
      id: checkout3
      if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success'
      uses: actions/checkout@v5
      with:
        token: ${{ github.token }}
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Require successful checkout
      if: steps.checkout1.outcome != 'success' && steps.checkout2.outcome != 'success' && steps.checkout3.outcome != 'success'
      shell: bash
      run: |
        echo "All checkout attempts failed" >&2
        exit 1
