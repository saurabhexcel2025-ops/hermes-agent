version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    ignore:
      # ESLint 10 breaks eslint-config-next / eslint-plugin-react (getFilename API change).
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      # Stay aligned with CI Node 20 — do not auto-bump to @types/node 22+.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
